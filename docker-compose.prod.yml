services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: prod
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3001
      NODE_ENV: production
    command: sh -c "node scripts/migrate.mjs && node .output/server/index.mjs"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: prod
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
