services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3001
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    command: sh -c "npm run migrate -w @recipe-finder/api && npm run dev -w @recipe-finder/api"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-/api}
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    depends_on:
      - api
    command: npm run dev -w @recipe-finder/web -- --host 0.0.0.0
