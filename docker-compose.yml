services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3001
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev -w @recipe-finder/api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-/api}
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    depends_on:
      - api
    command: npm run dev -w @recipe-finder/web -- --host 0.0.0.0

volumes:
  postgres-data:
