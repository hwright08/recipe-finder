databases:
  - name: recipe-finder-db
    databaseName: recipe_finder
    user: recipe_user

services:
  - type: web
    name: recipe-finder-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build -w @recipe-finder/api
    startCommand: npm run migrate -w @recipe-finder/api && npm run start -w @recipe-finder/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: recipe-finder-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://recipe-finder-web.onrender.com

  - type: web
    name: recipe-finder-web
    runtime: static
    buildCommand: npm ci && npm run build -w @recipe-finder/web
    staticPublishPath: apps/web/dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VITE_API_BASE
        value: https://recipe-finder-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
